<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Form</title>
    <style>
      /* Reset default styles and set up a modern font */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Center the Submit card vertically and horizontally */
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* Styling for the Submit container */
      .Submit-container {
        background: #ffffff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 400px;
      }

      .Submit-container h2 {
        margin-bottom: 24px;
        color: #333333;
        text-align: center;
        font-size: 28px;
      }

      /* Form layout */
      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #666666;
        font-size: 14px;
        font-weight: 600;
      }

      /* Styling the inputs */
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #cccccc;
        border-radius: 6px;
        font-size: 16px;
        transition: border-color 0.3s ease;
      }

      /* Add a nice glow effect when clicking into fields */
      .form-group input:focus {
        border-color: #667eea;
        outline: none;
      }

      /* Submit button styling */
      .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #667eea;
        border: none;
        border-radius: 6px;
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-top: 10px;
      }

      /* Hover effect for button */
      .submit-btn:hover {
        background-color: #5566c3;
      }

      /* Error alert styling */
      .error-alert {
        background-color: #ffeef0;
        color: #ff3333;
        border: 1px solid #ffa3a3;
        padding: 10px;
        border-radius: 6px;
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="Submit-container">
      <h2>Complete the Form</h2>
      <!-- ERROR_MESSAGE -->

      <form action="/submit" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your Name"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>
  </body>
</html>
