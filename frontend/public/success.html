<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Success</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .success-container {
        background: #ffffff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        text-align: center;
        max-width: 400px;
        width: 100%;
      }

      /* Success Icon (Checkmark) */
      .icon {
        font-size: 50px;
        color: #2ed573;
        margin-bottom: 15px;
      }

      h2 {
        color: #2f3542;
        margin-bottom: 10px;
        font-size: 24px;
      }

      p {
        color: #747d8c;
        margin-bottom: 25px;
      }

      .back-btn {
        display: inline-block;
        padding: 10px 20px;
        background-color: #667eea;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        transition: background 0.3s;
      }

      .back-btn:hover {
        background-color: #5566c3;
      }
    </style>
  </head>
  <body>
    <div class="success-container">
      <div class="icon">✓</div>
      <h2>Success!</h2>
      <p>Data submitted successfully.</p>
      <!-- <a href="index.html" class="back-btn">Go Back</a> -->
    </div>
  </body>
</html>
